spec:
  inputs:
    build_platforms:
      description: "选择构建平台"
      default: "all"
      options:
        - "all"
        - "windows"
        - "macos"

---
# =============================================================================
# GitLab CI: 镜像代码到 GitHub 并触发构建
# =============================================================================
#
# 流程:
#   1. CI 自动: 推送代码和 tag 到 GitHub，触发 GitHub Actions 构建
#   2. 手动操作: GitHub 构建完成后，在本地运行 scripts/manual-release.sh
#      下载产物 → 上传 Package Registry → 生成 update.json → 触发客户端更新
#
# 需要配置的 CI/CD 变量 (Settings → CI/CD → Variables):
#   - GITHUB_TOKEN:  GitHub Personal Access Token (需要 Contents + Actions 权限)
#   - GITHUB_REPO:   GitHub 仓库路径，如 Maroet/oneberry-devkit
# =============================================================================

workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

stages:
  - mirror

# -----------------------------------------------------------------------------
# 推送代码到 GitHub 并通过 API 触发构建
# -----------------------------------------------------------------------------
# 构建完成后，请在本地执行:
#   ./scripts/manual-release.sh <tag>
# 或者使用 SKIP_DOWNLOAD=1 模式手动下载后发布
# -----------------------------------------------------------------------------
mirror-to-github:
  stage: mirror
  image:
    name: image.hm.metavarse.tech:9443/hongmei-dev/alpine/git:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache curl
  script:
    - git config --global user.email "ci@oneberry.com"
    - git config --global user.name "GitLab CI"
    - git remote set-url github "https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git" 2>/dev/null || git remote add github "https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"
    - git push github HEAD:refs/heads/main --force
    - git push github "${CI_COMMIT_TAG}" --force
    - echo "✅ 代码和 tag ${CI_COMMIT_TAG} 已推送到 GitHub"
    - echo "🚀 触发 GitHub Actions 构建 (平台 $[[ inputs.build_platforms ]])..."
    - >-
      curl -s -o /dev/null -w "HTTP %{http_code}"
      -X POST
      -H "Authorization: token ${GITHUB_TOKEN}"
      -H "Accept: application/vnd.github.v3+json"
      "https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/build-desktop.yml/dispatches"
      -d "{\"ref\":\"${CI_COMMIT_TAG}\",\"inputs\":{\"platforms\":\"$[[ inputs.build_platforms ]]\",\"ref_tag\":\"${CI_COMMIT_TAG}\"}}"
    - echo ""
    - echo "══════════════════════════════════════════════════════"
    - echo "  GitHub Actions 构建已触发，请等待构建完成后执行:"
    - echo "  ./scripts/manual-release.sh ${CI_COMMIT_TAG}"
    - echo "══════════════════════════════════════════════════════"
